<!doctype html>
<html lang="ru"><head>
<meta charset="utf-8"><title>IntelDok Cockpit UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-page);font-family:var(--font-ui);color:var(--slate-800)}
  .app{display:flex;height:100vh;min-height:700px;background:var(--bg-page)}
  .main{flex:1;display:flex;flex-direction:column;min-width:0}
  .content{flex:1;padding:24px 32px;overflow:auto}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="Cockpit.jsx"></script>
<script type="text/babel">
function App() {
  const [nav, setNav] = React.useState('roster');
  const [selected, setSelected] = React.useState(null);

  return (
    <div className="app">
      <Sidebar current={nav} onChange={(v)=>{setNav(v);setSelected(null);}}/>
      <div className="main">
        <TopBar
          title={selected ? 'Карта пациента' : nav==='roster' ? 'Пациенты' : nav==='calendar' ? 'Приёмы на сегодня' : nav==='chats' ? 'Чаты' : 'Аналитика'}
          subtitle={selected ? null : nav==='roster' ? '6 активных · 2 требуют внимания' : null}
          right={
            <>
              <button style={{padding:'8px 14px',border:'1px solid var(--slate-200)',background:'#fff',borderRadius:10,fontFamily:'var(--font-ui)',fontSize:13,color:'var(--slate-700)',cursor:'pointer'}}>Поиск · ⌘K</button>
              <div style={{width:36,height:36,borderRadius:999,background:'var(--slate-100)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,color:'var(--slate-700)',fontSize:13}}>А.Б</div>
            </>
          }
        />
        <div className="content">
          {selected
            ? <PatientDetail id={selected} onBack={()=>setSelected(null)}/>
            : nav==='roster'
              ? <PatientList selectedId={selected} onSelect={setSelected}/>
              : <div style={{padding:80,textAlign:'center',color:'var(--slate-500)',fontFamily:'var(--font-ui)'}}>Раздел <b style={{color:'var(--slate-700)'}}>{nav}</b> в разработке.</div>
          }
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body></html>
