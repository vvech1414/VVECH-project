<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Chips</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:#fff;padding:22px;font-family:var(--font-ui)}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.chip{border-radius:999px;padding:10px 16px;font:700 12px/1 var(--font-ui);text-transform:uppercase;letter-spacing:.04em;cursor:pointer;border:1.5px solid var(--blue-100);background:var(--blue-050);color:var(--blue-600)}
.chip.active{background:var(--blue-600);color:#fff;border-color:var(--blue-600)}
.cat{border-radius:999px;padding:10px 18px;font:600 13px/1 var(--font-ui);border:0;color:var(--ink-700)}
.food{background:var(--gradient-category-food)}
.sugar{background:var(--gradient-category-sugar)}
.insulin{background:var(--gradient-category-insulin)}
.neutral{background:#E8E9F1}
.lbl{font:600 10px/1 var(--font-data);letter-spacing:.08em;text-transform:uppercase;color:var(--ink-500);margin-bottom:8px;display:block}
</style></head><body>
<span class="lbl">meal tags</span>
<div class="row">
  <span class="chip">Завтрак</span><span class="chip">Обед</span><span class="chip">Перекус</span>
  <span class="chip">Ужин</span><span class="chip">Тренировка</span><span class="chip active">Досуг</span>
  <span class="chip">Особое событие</span>
</div>
<span class="lbl">category pills</span>
<div class="row">
  <span class="cat sugar">Гликемия</span><span class="cat insulin">Инсулин</span>
  <span class="cat food">Еда</span><span class="cat neutral">Активность</span>
</div>
</body></html>
