<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Mascot</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:#fff;font-family:var(--font-ui);padding:18px;display:flex;gap:20px;align-items:center}
.stage{position:relative;width:280px;height:280px;display:flex;align-items:center;justify-content:center}
.halo{position:absolute;inset:0;background:var(--gradient-mascot-halo);border-radius:999px}
img{position:relative;width:220px;height:auto}
.bubble{background:var(--ink-050);border-radius:20px;padding:12px 16px;max-width:220px;font:400 14px/20px var(--font-ui);color:var(--ink-800);position:relative}
.bubble .name{font:700 12px/1 var(--font-ui);color:var(--ink-500);margin-bottom:4px}
.col{display:flex;flex-direction:column;gap:10px}
.desc{font:500 11px/1.4 var(--font-data);color:var(--ink-500);max-width:220px}
</style></head><body>
<div class="stage"><div class="halo"></div><img src="../assets/vasiliy-mascot.png" alt="Vasiliy"></div>
<div class="col">
  <div class="bubble"><div class="name">Василий</div>Привет! Я Василий, твой личный помощник</div>
  <div class="desc">Vasiliy (Василий) — brand mascot. A 3D droplet/doctor hybrid, cyan blue. Used in onboarding, empty states, recommendations, and the home-screen greeting.</div>
</div>
</body></html>
