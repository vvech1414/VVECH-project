<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<title>Color — Primary (medical indigo-blue)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--color-surface);font-family:var(--font-ui,'Manrope',system-ui)}
  .wrap{padding:20px;display:flex;gap:10px;flex-wrap:wrap}
  .sw{width:124px;border-radius:14px;overflow:hidden;background:var(--white);box-shadow:0 0 0 1px var(--slate-200)}
  .chip{height:76px}
  .meta{padding:10px 12px}
  .tok{font:600 12px/1.2 var(--font-ui,system-ui);color:var(--slate-800);letter-spacing:.01em}
  .hex{font:500 11px/1.3 var(--font-data,'Inter',ui-monospace,monospace);color:var(--slate-500);margin-top:2px;font-variant-numeric:tabular-nums}
  h2{font:700 14px/1 var(--font-ui);color:var(--slate-700);margin:0 0 12px;letter-spacing:.04em;text-transform:uppercase}
</style>
</head>
<body>
<div style="padding:20px 20px 0"><h2>Primary · medical indigo-blue</h2></div>
<div class="wrap">
  <div class="sw"><div class="chip" style="background:var(--blue-050)"></div><div class="meta"><div class="tok">blue-050</div><div class="hex">#EFF6FF</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--blue-100)"></div><div class="meta"><div class="tok">blue-100</div><div class="hex">#DBEAFE</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--blue-200)"></div><div class="meta"><div class="tok">blue-200</div><div class="hex">#BFDBFE</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--blue-300)"></div><div class="meta"><div class="tok">blue-300</div><div class="hex">#93C5FD</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--blue-400)"></div><div class="meta"><div class="tok">blue-400</div><div class="hex">#60A5FA</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--blue-500)"></div><div class="meta"><div class="tok">blue-500</div><div class="hex">#3B82F6</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--blue-600)"></div><div class="meta"><div class="tok">blue-600 · primary</div><div class="hex">#2563EB</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--blue-700)"></div><div class="meta"><div class="tok">blue-700 · hover</div><div class="hex">#1D4ED8</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--blue-800)"></div><div class="meta"><div class="tok">blue-800</div><div class="hex">#1E3A8A</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--blue-900)"></div><div class="meta"><div class="tok">blue-900</div><div class="hex">#0B2A6B</div></div></div>
</div>
</body></html>
