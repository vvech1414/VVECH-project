<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:#fff;padding:20px;font-family:var(--font-ui)}
.row{display:flex;align-items:center;gap:10px;padding:5px 0}
.bar{background:var(--blue-200);height:10px;border-radius:3px}
.lbl{font-size:11px;color:var(--ink-600);font-family:var(--font-data);font-weight:600;width:100px}
.val{font-size:11px;color:var(--ink-400);font-family:var(--font-data);font-variant-numeric:tabular-nums}
</style></head><body>
<div class="row"><div class="lbl">space-1</div><div class="bar" style="width:4px"></div><div class="val">4 px</div></div>
<div class="row"><div class="lbl">space-2</div><div class="bar" style="width:8px"></div><div class="val">8 px</div></div>
<div class="row"><div class="lbl">space-3</div><div class="bar" style="width:12px"></div><div class="val">12 px</div></div>
<div class="row"><div class="lbl">space-4 · gutter</div><div class="bar" style="width:16px"></div><div class="val">16 px</div></div>
<div class="row"><div class="lbl">space-5</div><div class="bar" style="width:20px"></div><div class="val">20 px</div></div>
<div class="row"><div class="lbl">space-6 · card gap</div><div class="bar" style="width:24px"></div><div class="val">24 px</div></div>
<div class="row"><div class="lbl">space-7</div><div class="bar" style="width:32px"></div><div class="val">32 px</div></div>
<div class="row"><div class="lbl">space-8</div><div class="bar" style="width:40px"></div><div class="val">40 px</div></div>
</body></html>
