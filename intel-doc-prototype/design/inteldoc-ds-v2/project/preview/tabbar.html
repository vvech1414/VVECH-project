<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Tab bar</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:#F5F9FA;padding:26px;font-family:var(--font-ui)}
.tabbar{position:relative;width:423px;height:70px;border-radius:18px;background:rgba(255,255,255,0.75);backdrop-filter:blur(40px);box-shadow:var(--shadow-md);display:flex;justify-content:space-around;align-items:center;padding:8px 16px;margin:0 auto}
.tab{display:flex;flex-direction:column;gap:4px;align-items:center;color:var(--ink-400);font:400 10px/1 var(--font-ui);width:75px}
.tab.active{color:var(--blue-600);font-weight:700}
svg{stroke:currentColor;stroke-width:2;fill:none}
.fab{position:absolute;top:-16px;left:50%;transform:translateX(-50%);width:56px;height:56px;border-radius:999px;background:var(--blue-600);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-lg)}
.fab svg{stroke-width:2.5}
</style></head><body>
<div class="tabbar">
  <div class="tab active"><svg width="22" height="22" viewBox="0 0 24 24"><path d="M3 11l9-8 9 8v10a2 2 0 0 1-2 2h-4v-6h-6v6H5a2 2 0 0 1-2-2z"/></svg>Главная</div>
  <div class="tab"><svg width="22" height="22" viewBox="0 0 24 24"><path d="M4 4h13a3 3 0 0 1 3 3v14H7a3 3 0 0 1-3-3zM4 4v13"/></svg>Дневник</div>
  <div class="fab"><svg width="22" height="22" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></div>
  <div class="tab"><svg width="22" height="22" viewBox="0 0 24 24"><path d="M3 9l2-4h14l2 4M3 9v11h18V9M3 9h18"/></svg>Маркет</div>
  <div class="tab"><svg width="22" height="22" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.11-1.22l2.11-1.63-2-3.46-2.48.86a7 7 0 0 0-2.12-1.22L14 3h-4l-.4 2.33a7 7 0 0 0-2.12 1.22l-2.48-.86-2 3.46 2.11 1.63A7 7 0 0 0 5 12a7 7 0 0 0 .11 1.22l-2.11 1.63 2 3.46 2.48-.86a7 7 0 0 0 2.12 1.22L10 21h4l.4-2.33a7 7 0 0 0 2.12-1.22l2.48.86 2-3.46-2.11-1.63A7 7 0 0 0 19 12z"/></svg>Настройки</div>
</div>
</body></html>
