<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Card — Recommendation</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:#fff;padding:20px;font-family:var(--font-ui)}
.card{background:var(--ink-050);border-radius:16px;padding:20px;max-width:520px}
.head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.title{font:700 18px/1 var(--font-ui);color:var(--ink-800)}
.more{font:700 12px/1 var(--font-ui);letter-spacing:.04em;text-transform:uppercase;color:var(--blue-600);display:inline-flex;align-items:center;gap:6px}
.desc{color:var(--ink-700);font-size:14px;line-height:20px;margin:6px 0 14px}
.btn{background:#fff;color:var(--blue-600);box-shadow:inset 0 0 0 1.5px var(--blue-600);border-radius:12px;padding:10px 14px;font:700 14px/1 var(--font-ui);border:0;display:inline-flex;gap:8px;align-items:center}
svg{stroke:currentColor;stroke-width:2;fill:none}
</style></head><body>
<div class="card">
  <div class="head">
    <div class="title">Полезные советы</div>
    <span class="more">Еще <svg width="12" height="12" viewBox="0 0 24 24"><path d="m9 6 6 6-6 6"/></svg></span>
  </div>
  <div class="desc">Похоже у вас заканчиваются иглы для шприц-ручек. Рекомендуем пополнить запасы.</div>
  <button class="btn">Заказать <svg width="14" height="14" viewBox="0 0 24 24"><path d="M3 6h18l-2 13H5L3 6zm5 0V4a4 4 0 0 1 8 0v2"/></svg></button>
</div>
</body></html>
