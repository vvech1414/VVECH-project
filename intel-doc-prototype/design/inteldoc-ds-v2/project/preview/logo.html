<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:#fff;font-family:var(--font-ui);padding:20px;display:flex;gap:24px;align-items:center}
.box{display:flex;align-items:center;gap:10px}
.mark{width:44px;height:44px;border-radius:12px;background:var(--blue-600);color:#fff;display:flex;align-items:center;justify-content:center;font:800 22px/1 var(--font-display);letter-spacing:-.04em}
.wm{font:500 30px/1 var(--font-display);color:var(--ink-900);letter-spacing:-.02em}
.wm span{color:var(--blue-600)}
.alt{background:var(--ink-900);color:#fff;border-radius:14px;padding:14px 20px;display:flex;align-items:center;gap:12px}
.alt .mark{background:var(--blue-300)}
.alt .wm{color:#fff}
.alt .wm span{color:var(--blue-300)}
</style></head><body>
<div class="box"><div class="mark">iD</div><div class="wm">Intel<span>Doc</span></div></div>
<div class="alt"><div class="mark">iD</div><div class="wm">Intel<span>Doc</span></div></div>
</body></html>
