<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Chat bubbles</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:#fff;padding:22px;font-family:var(--font-ui)}
.wrap{max-width:420px;display:flex;flex-direction:column;gap:10px}
.b{border-radius:20px;padding:12px 16px;max-width:300px;font:400 14px/20px var(--font-ui)}
.rx{background:var(--ink-050);color:var(--ink-800);align-self:flex-start}
.tx{background:var(--blue-600);color:#fff;align-self:flex-end}
.name{font:700 12px/1 var(--font-ui);margin-bottom:4px}
.rx .name{color:var(--ink-500)}
.tx .name{color:var(--blue-100)}
</style></head><body>
<div class="wrap">
  <div class="b rx"><div class="name">Василий</div>Наблюдается тенденция к изменению твоего фактора чувствительности, что приводит к гипогликемиям</div>
  <div class="b tx"><div class="name">Михалыч</div>Охренеть. И что делать?</div>
  <div class="b rx"><div class="name">Василий</div>Попробуйте меньше жрать</div>
</div>
</body></html>
