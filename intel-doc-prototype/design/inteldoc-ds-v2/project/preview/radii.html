<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:#fff;padding:22px;font-family:var(--font-ui)}
.wrap{display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end}
.sw{display:flex;flex-direction:column;align-items:center;gap:6px}
.box{width:60px;height:60px;background:var(--blue-050);box-shadow:inset 0 0 0 1.5px var(--blue-600)}
.lbl{font-size:10px;color:var(--ink-600);font-family:var(--font-data);font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.val{font-size:11px;color:var(--ink-800);font-weight:700;font-family:var(--font-data)}
</style></head><body>
<div class="wrap">
  <div class="sw"><div class="box" style="border-radius:6px"></div><div class="val">6</div><div class="lbl">xs</div></div>
  <div class="sw"><div class="box" style="border-radius:8px"></div><div class="val">8</div><div class="lbl">sm</div></div>
  <div class="sw"><div class="box" style="border-radius:12px"></div><div class="val">12</div><div class="lbl">md · btn</div></div>
  <div class="sw"><div class="box" style="border-radius:16px"></div><div class="val">16</div><div class="lbl">lg · card</div></div>
  <div class="sw"><div class="box" style="border-radius:20px"></div><div class="val">20</div><div class="lbl">xl · sheet</div></div>
  <div class="sw"><div class="box" style="border-radius:24px"></div><div class="val">24</div><div class="lbl">2xl</div></div>
  <div class="sw"><div class="box" style="border-radius:999px;width:110px"></div><div class="val">pill</div><div class="lbl">chip</div></div>
</div>
</body></html>
