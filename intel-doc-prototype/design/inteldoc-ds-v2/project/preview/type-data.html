<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Type — Data</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:#fff;padding:18px 22px;font-family:var(--font-ui)}
.row{display:flex;align-items:baseline;gap:22px;padding:12px 0;border-bottom:1px solid var(--ink-100)}
.row:last-child{border:none}
.label{width:140px;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-500);font-family:var(--font-data);font-weight:600}
b{color:var(--ink-900)}
</style></head><body>
<div class="row"><div class="label">Data XL · Inter 700 · 28</div><div class="t-data-xl">4.5 <span style="font-size:14px;color:var(--ink-500);font-weight:500">ммоль/л</span></div></div>
<div class="row"><div class="label">Data lg · Inter 700 · 20</div><div class="t-data-lg">37.5%</div></div>
<div class="row"><div class="label">Data · Inter 600 · 14</div><div class="t-data">₽ 8&nbsp;669</div></div>
<div class="row"><div class="label">Row · numeric</div><div class="t-body">Гликемия <b style="margin-left:auto;font-family:var(--font-data);font-variant-numeric:tabular-nums">3.4 ммоль/л</b></div></div>
</body></html>
