<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<title>Color — Category & action pastels</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--color-surface);font-family:var(--font-ui,'Manrope',system-ui)}
  h2{font:700 14px/1 var(--font-ui);color:var(--slate-700);margin:0 0 12px;letter-spacing:.04em;text-transform:uppercase}
  .section{padding:20px}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
  .card{border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:10px;min-height:120px;justify-content:space-between}
  .ic{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;font:600 13px/1 var(--font-ui)}
  .lbl{font:700 13px/1.2 var(--font-ui)}
  .sub{font:500 11px/1.3 var(--font-data,'Inter',monospace);color:var(--slate-500);font-variant-numeric:tabular-nums}
  .tag{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font:600 11px/1 var(--font-ui)}
</style>
</head>
<body>
<div class="section">
  <h2>Patient-detail action tiles</h2>
  <div class="row">
    <div class="card" style="background:var(--action-timeline-bg);color:var(--action-timeline-fg)">
      <div class="ic" style="background:var(--white);color:var(--action-timeline-fg)">⏱</div>
      <div><div class="lbl">Таймлайн</div><div class="sub" style="color:var(--action-timeline-fg);opacity:.7">action-timeline-*</div></div>
    </div>
    <div class="card" style="background:var(--action-documents-bg);color:var(--action-documents-fg)">
      <div class="ic" style="background:var(--white);color:var(--action-documents-fg)">◫</div>
      <div><div class="lbl">Документы</div><div class="sub" style="color:var(--action-documents-fg);opacity:.7">action-documents-*</div></div>
    </div>
    <div class="card" style="background:var(--action-requests-bg);color:var(--action-requests-fg)">
      <div class="ic" style="background:var(--white);color:var(--action-requests-fg)">↗</div>
      <div><div class="lbl">Запросы</div><div class="sub" style="color:var(--action-requests-fg);opacity:.7">action-requests-*</div></div>
    </div>
    <div class="card" style="background:var(--action-notes-bg);color:var(--action-notes-fg)">
      <div class="ic" style="background:var(--white);color:var(--action-notes-fg)">✎</div>
      <div><div class="lbl">Заметки</div><div class="sub" style="color:var(--action-notes-fg);opacity:.7">action-notes-*</div></div>
    </div>
  </div>

  <h2>Category tags (timeline / diary)</h2>
  <div style="display:flex;gap:10px;flex-wrap:wrap">
    <span class="tag" style="background:var(--cat-analysis-bg);color:var(--cat-analysis-fg)">Анализ</span>
    <span class="tag" style="background:var(--cat-imaging-bg);color:var(--cat-imaging-fg)">Визуализация</span>
    <span class="tag" style="background:var(--cat-consult-bg);color:var(--cat-consult-fg)">Консультация</span>
    <span class="tag" style="background:var(--cat-note-bg);color:var(--cat-note-fg)">Заметка</span>
    <span class="tag" style="background:var(--blue-600);color:#fff">2 новых</span>
    <span class="tag" style="background:var(--error-bg);color:var(--error-dark);box-shadow:inset 0 0 0 1px var(--rose-300)">Просрочено</span>
    <span class="tag" style="background:var(--success-bg);color:var(--success-dark)">Активен</span>
  </div>
</div>
</body></html>
